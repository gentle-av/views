<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#fabd2f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Media Center" />
    <title>Media Center</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2><i class="fas fa-play-circle"></i> Media Center</h2>
        </div>
        <nav class="sidebar-nav">
          <button class="sidebar-btn active" data-page="video" id="navVideo">
            <i class="fas fa-video"></i>
            <span>Видео</span>
          </button>
          <button class="sidebar-btn" data-page="audio" id="navAudio">
            <i class="fas fa-music"></i>
            <span>Аудио</span>
          </button>
        </nav>
      </aside>
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
      <main class="main-content">
        <header class="app-header" id="appHeader">
          <div class="header-title-section">
            <h1 class="page-title" id="pageTitle">
              <i class="fas fa-video"></i> Видео
            </h1>
          </div>
          <div class="header-controls-section">
            <div class="mobile-nav-buttons" id="mobileNavButtons">
              <button class="header-btn nav-video-btn active" id="navVideoBtn">
                <i class="fas fa-video"></i>
                <span>Видео</span>
              </button>
              <button class="header-btn nav-audio-btn" id="navAudioBtn">
                <i class="fas fa-music"></i>
                <span>Аудио</span>
              </button>
            </div>
            <div class="search-box" id="globalSearchBox" style="display: none">
              <i class="fas fa-search"></i>
              <input
                type="text"
                id="globalSearchInput"
                placeholder="Поиск..."
              />
            </div>
            <button
              class="header-btn playlist-toggle-header"
              id="headerPlaylistBtn"
              title="Плейлист"
            >
              <i class="fas fa-list"></i>
              <span>Плейлист</span>
            </button>
            <button
              class="header-btn refresh-header refresh-btn"
              id="headerRefreshBtn"
              title="Обновить"
              style="display: none"
            >
              <i class="fas fa-sync-alt"></i>
              <span>Обновить</span>
            </button>
          </div>
        </header>
        <div class="scrollable-content" id="scrollableContent">
          <div class="page-container" id="pageContainer"></div>
        </div>
        <div class="audio-player-bar" id="audioPlayerBar" style="display: none">
          <div class="player-album-art">
            <img id="playerAlbumArt" src="" alt="Обложка альбома" />
          </div>
          <div class="player-info">
            <div class="player-track" id="playerTrack">—</div>
            <div class="player-album" id="playerAlbum">—</div>
            <div class="player-artist" id="playerArtist">—</div>
          </div>
          <div class="player-controls">
            <button class="player-btn" id="playerPrevBtn">
              <i class="fas fa-backward-step"></i>
            </button>
            <button class="player-btn primary" id="playerPlayBtn">
              <i class="fas fa-play"></i>
            </button>
            <button class="player-btn" id="playerNextBtn">
              <i class="fas fa-forward-step"></i>
            </button>
            <button class="player-btn" id="playerStopBtn">
              <i class="fas fa-stop"></i>
            </button>
          </div>
          <div class="player-volume">
            <i class="fas fa-volume-up"></i>
            <div class="volume-slider" id="volumeSlider">
              <div class="volume-progress" id="volumeProgress"></div>
            </div>
          </div>
        </div>
      </main>
      <div id="albumModal" class="modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3 id="modalAlbumTitle"></h3>
            <button class="modal-close">&times;</button>
          </div>
          <div class="modal-body">
            <div id="modalTracksList" class="tracks-list"></div>
          </div>
        </div>
      </div>
      <div class="loading-progress" id="loadingProgress">
        <div class="loading-progress-bar"></div>
      </div>
      <div id="notification" class="notification" style="display: none"></div>
    </div>
    <script src="js/core/config.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/event-bus.js"></script>
    <script src="js/services/api-client.js"></script>
    <script src="js/services/player-api-client.js"></script>
    <script src="js/modules/track.js"></script>
    <script src="js/modules/album.js"></script>
    <script src="js/ui/track-list.js"></script>
    <script src="js/ui/album-modal.js"></script>
    <script src="js/ui/album-card.js"></script>
    <script src="js/ui/album-library.js"></script>
    <script src="js/ui/bottom-player-panel.js"></script>
    <script src="js/ui/playlist-popup.js"></script>
    <script src="js/core/playback-controller.js"></script>
    <script src="js/modules/video-library.js"></script>
    <script src="js/modules/navigation-manager.js"></script>
    <script src="js/modules/album-tag-updater.js"></script>
    <script src="js/modules/confirm-dialog.js"></script>
    <script src="js/modules/delete-dialog.js"></script>
    <script src="js/core/video-player-controller.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
