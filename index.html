<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#fabd2f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Media Center" />
    <title>Media Center</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/styles.css?v=2" />
    <link rel="stylesheet" href="css/universal-player.css?v=2" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2><i class="fas fa-play-circle"></i> Media Center</h2>
        </div>
        <nav class="sidebar-nav">
          <button class="sidebar-btn active" data-page="video" id="navVideo">
            <i class="fas fa-video"></i>
            <span>Видео</span>
          </button>
          <button class="sidebar-btn" data-page="audio" id="navAudio">
            <i class="fas fa-music"></i>
            <span>Аудио</span>
          </button>
        </nav>
      </aside>
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
      <main class="main-content">
        <header class="app-header" id="appHeader">
          <div class="header-title-section">
            <h1 class="page-title" id="pageTitle">
              <i class="fas fa-video"></i> Видео
            </h1>
          </div>
          <div class="header-controls-section">
            <div class="mobile-nav-buttons" id="mobileNavButtons">
              <button class="header-btn nav-video-btn active" id="navVideoBtn">
                <i class="fas fa-video"></i>
                <span>Видео</span>
              </button>
              <button class="header-btn nav-audio-btn" id="navAudioBtn">
                <i class="fas fa-music"></i>
                <span>Аудио</span>
              </button>
            </div>
            <div
              class="search-wrapper"
              id="globalSearchBox"
              style="display: none"
            >
              <i class="fas fa-search"></i>
              <input
                type="text"
                id="globalSearchInput"
                placeholder="Поиск..."
              />
              <button
                class="search-clear-btn"
                id="searchClearBtn"
                style="display: none"
              >
                <i class="fas fa-times"></i>
              </button>
            </div>
            <button
              class="header-btn playlist-toggle-header audio-only"
              id="headerPlaylistBtn"
              title="Плейлист"
              style="display: none"
            >
              <i class="fas fa-list"></i>
              <span>Плейлист</span>
            </button>
            <button
              class="header-btn refresh-metadata-btn audio-only"
              id="headerRefreshMetadataBtn"
              title="Обновить метаданные"
              style="display: none"
            >
              <i class="fas fa-sync-alt"></i>
              <span>Обновить</span>
            </button>
            <button
              class="header-btn refresh-header refresh-btn"
              id="headerRefreshBtn"
              title="Обновить"
              style="display: none"
            >
              <i class="fas fa-sync-alt"></i>
              <span>Обновить</span>
            </button>
          </div>
        </header>
        <div class="scrollable-content" id="scrollableContent">
          <div class="page-container" id="pageContainer"></div>
        </div>
      </main>
      <div id="albumModal" class="modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3 id="modalAlbumTitle"></h3>
            <button class="modal-close">&times;</button>
          </div>
          <div class="modal-body">
            <div id="modalTracksList" class="tracks-list"></div>
          </div>
        </div>
      </div>
      <div class="loading-progress" id="loadingProgress">
        <div class="loading-progress-bar"></div>
      </div>
      <div id="notification" class="notification" style="display: none"></div>
    </div>

    <!-- Universal Player Panel -->
    <div
      id="universalBottomPlayer"
      class="universal-bottom-player"
      style="display: none"
    >
      <div
        class="universal-bottom-player-minimize-bar"
        id="universalMinimizeBar"
      >
        <i class="fas fa-chevron-up"></i>
      </div>
      <div class="universal-bottom-player-content">
        <div class="universal-bottom-player-info">
          <div
            class="universal-bottom-player-preview"
            id="universalBottomPreview"
          >
            <i id="universalBottomPreviewIcon" class="fas fa-play-circle"></i>
            <img
              id="universalBottomPreviewImg"
              style="display: none"
              alt="Preview"
            />
          </div>
          <div class="universal-bottom-player-track-info">
            <div
              id="universalBottomTrackName"
              class="universal-bottom-player-track-name"
            >
              —
            </div>
            <div
              id="universalBottomTrackArtist"
              class="universal-bottom-player-track-artist"
            ></div>
            <div
              id="universalBottomTrackCount"
              class="universal-bottom-player-track-count"
              style="font-size: 0.7rem; color: var(--yellow); margin-top: 2px"
            ></div>
          </div>
        </div>
        <div class="universal-bottom-player-progress">
          <div class="universal-bottom-player-progress-bar-container">
            <span
              id="universalBottomCurrentTime"
              class="universal-bottom-player-time-current"
              >0:00</span
            >
            <div
              id="universalBottomProgressBar"
              class="universal-bottom-player-progress-bar"
            >
              <div
                id="universalBottomProgressFill"
                class="universal-bottom-player-progress-fill"
              ></div>
            </div>
            <span
              id="universalBottomDuration"
              class="universal-bottom-player-time-total"
              >0:00</span
            >
          </div>
        </div>
        <div class="universal-bottom-player-controls">
          <button
            id="universalBottomPrevBtn"
            class="universal-bottom-player-btn"
            title="Предыдущий"
          >
            <i class="fas fa-backward-step"></i>
          </button>
          <button
            id="universalBottomPlayPauseBtn"
            class="universal-bottom-player-btn universal-bottom-player-play"
            title="Play/Pause"
          >
            <i class="fas fa-play"></i>
          </button>
          <button
            id="universalBottomStopBtn"
            class="universal-bottom-player-btn"
            title="Стоп"
          >
            <i class="fas fa-stop"></i>
          </button>
          <button
            id="universalBottomNextBtn"
            class="universal-bottom-player-btn"
            title="Следующий"
          >
            <i class="fas fa-forward-step"></i>
          </button>
          <button
            id="universalBottomFullscreenBtn"
            class="universal-bottom-player-btn"
            title="Полный экран"
          >
            <i class="fas fa-expand"></i>
          </button>
          <button
            id="universalBottomSettingsToggle"
            class="universal-bottom-player-btn universal-bottom-player-settings-toggle"
            title="Настройки"
          >
            <i class="fas fa-sliders-h"></i>
          </button>
        </div>
      </div>
      <div
        id="universalBottomSettings"
        class="universal-bottom-player-settings collapsed"
      >
        <div class="universal-bottom-player-volume-section">
          <div class="universal-bottom-player-volume-controls">
            <button
              id="universalBottomVolumeDown"
              class="universal-bottom-player-volume-btn"
              title="Уменьшить громкость"
            >
              <i class="fas fa-minus"></i>
            </button>
            <button
              id="universalBottomVolumeMute"
              class="universal-bottom-player-volume-mute"
              title="Мьют"
            >
              <i class="fas fa-volume-up"></i>
            </button>
            <button
              id="universalBottomVolumeUp"
              class="universal-bottom-player-volume-btn"
              title="Увеличить громкость"
            >
              <i class="fas fa-plus"></i>
            </button>
            <span
              id="universalBottomVolumeValue"
              class="universal-bottom-player-volume-value"
              >50%</span
            >
          </div>
        </div>
        <div class="universal-bottom-player-output-section">
          <span class="universal-bottom-player-output-label"
            ><i class="fas fa-exchange-alt"></i> Аудиовыход:</span
          >
          <button
            id="universalBottomSpeakersBtn"
            class="universal-bottom-player-output-btn speakers-btn"
            title="Колонки"
          >
            <i class="fas fa-volume-up"></i><span>Колонки</span>
          </button>
          <button
            id="universalBottomHeadphonesBtn"
            class="universal-bottom-player-output-btn headphones-btn"
            title="Наушники"
          >
            <i class="fas fa-headphones"></i><span>Наушники</span>
          </button>
        </div>
      </div>
    </div>

    <script src="js/core/config.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/event-bus.js"></script>
    <script src="js/services/api-client.js"></script>
    <script src="js/services/player-api-client.js"></script>
    <script src="js/services/music-api-client.js"></script>
    <script src="js/modules/track.js"></script>
    <script src="js/modules/album.js"></script>
    <script src="js/modules/refresh-manager.js"></script>
    <script src="js/ui/track-list.js"></script>
    <script src="js/ui/album-modal.js"></script>
    <script src="js/ui/album-card.js"></script>
    <script src="js/ui/album-library.js"></script>
    <script src="js/ui/playlist-popup.js"></script>
    <script src="js/ui/universal-player.js"></script>
    <script src="js/core/playback-controller.js"></script>
    <script src="js/modules/video-library.js"></script>
    <script src="js/modules/navigation-manager.js"></script>
    <script src="js/modules/confirm-dialog.js"></script>
    <script src="js/modules/delete-dialog.js"></script>
    <script src="js/modules/tag-editor.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
