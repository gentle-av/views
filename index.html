<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медиа проводник /mnt/video</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="top-player-bar" id="topPlayerBar">
        <div class="player-info">
            <i class="fas fa-film player-icon"></i>
            <div class="player-track-info">
                <div class="player-track-name" id="playerTrackName">Нет активного файла</div>
                <div class="player-track-path" id="playerTrackPath"></div>
            </div>
        </div>
        <div class="player-top-controls">
            <button class="top-control-btn" id="topPlayPauseBtn" disabled>
                <i class="fas fa-play"></i>
            </button>
            <!-- Удалена кнопка topFullscreenBtn -->
            <button class="top-control-btn" id="topCloseFileBtn" disabled>
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <button class="menu-button" id="menuBtn">
        <i class="fas fa-bars"></i>
    </button>

    <div class="main-container">
        <div class="left-panel" id="leftPanel">
            <div class="panel-header">
                <h3>
                    <i class="fas fa-folder-tree"></i>
                    Дерево папок
                </h3>
                <button class="btn-close-panel" id="closePanelBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="tree-container" id="treeContainer">
                <div class="loading-tree" style="padding: 20px; text-align: center; color: var(--fg3);">Загрузка...</div>
            </div>
        </div>

        <div class="slider-container">
            <div class="slider-wrapper" id="sliderWrapper">
                <div class="slider-content" id="sliderContent">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin" style="margin-right: 10px;"></i>
                        Загрузка...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="playerControlPage" class="player-control-page">
        <div class="player-control-header">
            <div class="current-file-info">
                <i class="fas fa-film"></i>
                <div class="file-details">
                    <div class="file-name" id="currentFileName">Название файла</div>
                    <div class="file-path" id="currentFilePath">Путь к файлу</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="playPauseBtn" title="Воспроизведение/Пауза">
                    <i class="fas fa-play"></i>
                </button>
                <!-- Удалена кнопка exitFullscreenBtn -->
                <button class="control-btn close-file" id="closeFileBtn" title="Закрыть файл">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        <div class="player-placeholder">
            <i class="fas fa-play-circle"></i>
            <div>Видео воспроизводится в Mediateka</div>
            <div style="font-size: 1rem; margin-top: 20px; color: var(--fg3);">Используйте кнопки управления выше</div>
        </div>
        <button class="close-control-page" title="Закрыть панель управления">
            <i class="fas fa-arrow-left"></i>
        </button>
    </div>

    <div id="hiddenCount" class="hidden-count" style="display: none;">
        <i class="fas fa-eye-slash"></i>
        <span></span>
    </div>

    <div class="scroll-indicator" id="scrollIndicator">
        <div class="scroll-indicator-bar" id="scrollIndicatorBar"></div>
    </div>

    <div class="loading-progress" id="loadingProgress">
        <div class="loading-progress-bar"></div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/tree.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
