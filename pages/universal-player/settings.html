<div
  id="universalBottomSettings"
  class="universal-bottom-player-settings collapsed"
>
  <div class="universal-bottom-player-volume-section">
    <div class="universal-bottom-player-volume-controls">
      <button
        id="universalBottomVolumeDown"
        class="universal-bottom-player-volume-btn"
        title="Уменьшить громкость"
      >
        <i class="fas fa-minus"></i>
      </button>
      <button
        id="universalBottomVolumeMute"
        class="universal-bottom-player-volume-mute"
        title="Мьют"
      >
        <i class="fas fa-volume-up"></i>
      </button>
      <button
        id="universalBottomVolumeUp"
        class="universal-bottom-player-volume-btn"
        title="Увеличить громкость"
      >
        <i class="fas fa-plus"></i>
      </button>
      <span
        id="universalBottomVolumeValue"
        class="universal-bottom-player-volume-value"
        >50%</span
      >
    </div>
  </div>
  <div class="universal-bottom-player-output-section">
    <span class="universal-bottom-player-output-label"
      ><i class="fas fa-exchange-alt"></i> Аудиовыход:</span
    >
    <button
      id="universalBottomSpeakersBtn"
      class="universal-bottom-player-output-btn speakers-btn"
      title="Колонки"
    >
      <i class="fas fa-volume-up"></i><span>Колонки</span>
    </button>
    <button
      id="universalBottomHeadphonesBtn"
      class="universal-bottom-player-output-btn headphones-btn"
      title="Наушники"
    >
      <i class="fas fa-headphones"></i><span>Наушники</span>
    </button>
  </div>
</div>
