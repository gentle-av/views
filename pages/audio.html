<div class="page audio-page">
  <div class="audio-library">
    <div class="albums-grid" id="albumsGrid">
      <div class="loading">
        <i class="fas fa-spinner fa-spin"></i> Загрузка альбомов...
      </div>
    </div>
  </div>
  <div class="audio-player-control-panel" id="audioPlayerControlPanel">
    <div class="player-panel-content">
      <div class="player-panel-info">
        <div class="player-panel-track-info">
          <div class="player-panel-track-name" id="panelTrackName">
            Нет треков
          </div>
          <div class="player-panel-track-artist" id="panelTrackArtist"></div>
        </div>
        <div class="player-panel-progress">
          <span class="player-panel-time-current" id="panelTimeCurrent"
            >0:00</span
          >
          <div class="player-panel-progress-bar" id="panelProgressBar">
            <div
              class="player-panel-progress-fill"
              id="panelProgressFill"
              style="width: 0%"
            ></div>
          </div>
          <span class="player-panel-time-total" id="panelTimeTotal">0:00</span>
        </div>
      </div>
      <div class="player-panel-controls">
        <button class="player-panel-btn" id="panelPrevBtn" title="Предыдущий">
          <i class="fas fa-step-backward"></i>
        </button>
        <button
          class="player-panel-btn player-panel-play"
          id="panelPlayPauseBtn"
          title="Воспроизвести"
        >
          <i class="fas fa-play"></i>
        </button>
        <button class="player-panel-btn" id="panelNextBtn" title="Следующий">
          <i class="fas fa-step-forward"></i>
        </button>
        <button class="player-panel-btn" id="panelStopBtn" title="Стоп">
          <i class="fas fa-stop"></i>
        </button>
      </div>
    </div>
  </div>
  <div class="playlist-popup" id="playlistPopup">
    <div class="playlist-popup-header">
      <h3><i class="fas fa-list"></i> Плейлист</h3>
      <button class="playlist-popup-close" id="playlistPopupClose">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="playlist-container" id="playlistContainer">
      <div class="playlist-empty">
        <i class="fas fa-music"></i>
        <p>Плейлист пуст</p>
      </div>
    </div>
    <div class="playlist-popup-controls">
      <span class="playlist-popup-count" id="playlistTrackCount">0 треков</span>
      <button
        class="playlist-popup-btn"
        id="playlistClearBtn"
        title="Очистить плейлист"
      >
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  </div>
</div>
