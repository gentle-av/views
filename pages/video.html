<div class="page video-page">
  <div class="video-library">
    <div class="video-explorer">
      <div class="explorer-header">
        <div class="breadcrumbs" id="videoBreadcrumbs"></div>
      </div>
      <div class="content-grid" id="videoContent">
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i> Загрузка...
        </div>
      </div>
    </div>
  </div>
</div>

<div id="playerControlPage" class="player-control-page" style="display: none">
  <div class="player-control-header">
    <div class="player-file-info">
      <i class="fas fa-video"></i>
      <span id="videoFileName" class="video-filename">—</span>
    </div>
    <button id="closeControlPage" class="close-control-page" title="Свернуть">
      <i class="fas fa-chevron-down"></i>
    </button>
  </div>

  <div class="player-video-preview" id="playerVideoPreview">
    <img
      id="videoPreviewImg"
      class="video-preview-img"
      style="display: none"
      alt="Video preview"
    />
    <div id="videoPreviewPlaceholder" class="video-preview-placeholder">
      <i class="fas fa-play-circle"></i>
    </div>
  </div>

  <div class="player-progress-section">
    <div class="player-progress-container">
      <span id="videoCurrentTime" class="video-time">0:00</span>
      <div id="videoProgressBar" class="video-progress-bar">
        <div id="videoProgressFill" class="video-progress-fill"></div>
        <div id="videoProgressHover" class="video-progress-hover"></div>
      </div>
      <span id="videoDuration" class="video-time">0:00</span>
    </div>
  </div>

  <div class="player-controls-center">
    <button id="seekBackwardBtn" class="control-btn" title="Назад 10с">
      <i class="fas fa-backward-step"></i>
    </button>
    <button id="playPauseBtn" class="control-btn play-pause-btn" title="Пауза">
      <i class="fas fa-pause"></i>
    </button>
    <button id="seekForwardBtn" class="control-btn" title="Вперед 10с">
      <i class="fas fa-forward-step"></i>
    </button>
    <button id="fullscreenBtn" class="control-btn" title="Полный экран">
      <i class="fas fa-expand"></i>
    </button>
    <button id="deleteFileBtn" class="control-btn delete-file" title="Удалить">
      <i class="fas fa-trash-alt"></i>
    </button>
    <button id="closeFileBtn" class="control-btn close-file" title="Закрыть">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="player-controls-bottom">
    <div class="volume-section">
      <div class="volume-controls">
        <button
          id="volumeDownBtn"
          class="control-btn volume-btn"
          title="Уменьшить громкость"
        >
          <i class="fas fa-volume-down"></i>
        </button>
        <div class="volume-slider-container">
          <div id="volumeSlider" class="volume-slider">
            <div id="volumeFill" class="volume-fill"></div>
          </div>
          <span id="volumeValue" class="volume-value">100%</span>
        </div>
        <button
          id="volumeUpBtn"
          class="control-btn volume-btn"
          title="Увеличить громкость"
        >
          <i class="fas fa-volume-up"></i>
        </button>
        <button
          id="volumeMuteBtn"
          class="control-btn volume-mute-btn"
          title="Выключить звук"
        >
          <i class="fas fa-volume-up"></i>
        </button>
      </div>
    </div>

    <div class="audio-output-section">
      <span class="output-label">Выход:</span>
      <button
        id="switchToSpeakersBtn"
        class="output-btn speakers-btn"
        title="Колонки"
      >
        <i class="fas fa-volume-up"></i>
        <span>Колонки</span>
      </button>
      <button
        id="switchToHeadphonesBtn"
        class="output-btn headphones-btn"
        title="Наушники"
      >
        <i class="fas fa-headphones"></i>
        <span>Наушники</span>
      </button>
    </div>
  </div>
</div>
