<div class="page power-page">
  <div class="power-management-container">
    <div class="power-page-header">
      <h2><i class="fas fa-microchip"></i> Управление питанием</h2>
    </div>
    <div class="power-cards-grid">
      <div class="power-card tv-card">
        <div class="power-card-icon"><i class="fas fa-tv"></i></div>
        <h3 class="power-card-title">Телевизор</h3>
        <p class="power-card-status" id="tvStatus">
          <span class="status-dot"></span>
          <span class="status-text">Проверка...</span>
        </p>
        <button class="power-btn tv-power-btn" id="tvPowerBtn">
          <i class="fas fa-power-off"></i> <span>Вкл/Выкл</span>
        </button>
      </div>
      <div class="power-card computer-card">
        <div class="power-card-icon"><i class="fas fa-desktop"></i></div>
        <h3 class="power-card-title">Компьютер</h3>
        <p class="power-card-status" id="computerStatus">
          <span class="status-dot"></span>
          <span class="status-text">Активен</span>
        </p>
        <button class="power-btn sleep-btn" id="sleepBtn">
          <i class="fas fa-moon"></i> <span>Сон</span>
        </button>
      </div>
    </div>
    <div class="volume-section">
      <div class="section-title">
        <i class="fas fa-volume-up"></i> Системная громкость
      </div>
      <div class="volume-controls">
        <button class="volume-down" id="systemVolumeDown">
          <i class="fas fa-minus"></i>
        </button>
        <div class="volume-slider">
          <div class="volume-fill" id="systemVolumeFill"></div>
          <input
            type="range"
            id="systemVolumeRange"
            min="0"
            max="100"
            value="50"
          />
        </div>
        <button class="volume-up" id="systemVolumeUp">
          <i class="fas fa-plus"></i>
        </button>
        <button class="volume-mute" id="systemVolumeMute">
          <i class="fas fa-volume-up"></i>
        </button>
        <span class="volume-value" id="systemVolumeValue">50%</span>
      </div>
    </div>
    <div class="audio-output-section">
      <div class="section-title">
        <i class="fas fa-exchange-alt"></i> Аудиовыход
      </div>
      <div class="audio-output-controls">
        <button class="audio-output-btn speakers-btn" id="audioSpeakersBtn">
          <i class="fas fa-volume-up"></i> Колонки
        </button>
        <button class="audio-output-btn headphones-btn" id="audioHeadphonesBtn">
          <i class="fas fa-headphones"></i> Наушники
        </button>
      </div>
    </div>
  </div>
</div>
